# docker-compose.safe.yml — Claude Code CLI without Docker access
#
# Runs the container WITHOUT the --privileged flag, which means the
# nested Docker daemon cannot start. The agent can still write code,
# run tests, and use all other tools — but cannot build or run Docker
# containers.
#
# Use this when you want Claude to work on code without any Docker
# capabilities (e.g., for untrusted repositories or code-only tasks).
#
# Usage:
#   docker compose -f docker-compose.safe.yml run --rm claude claude
#
#   # Mount a specific project directory:
#   PROJECT_PATH=/path/to/project docker compose -f docker-compose.safe.yml run --rm claude claude

services:
  claude:
    build: .
    image: claude-dev

    # No privileged flag = dockerd cannot start = no Docker access.
    # The entrypoint will time out waiting for dockerd and exit with an error.
    # To handle this gracefully, set SKIP_DOCKER=1:
    environment:
      - SKIP_DOCKER=1

    stdin_open: true
    tty: true

    volumes:
      - ./auth:/home/claude/.claude
      - ${PROJECT_PATH:-.}:/workspace
