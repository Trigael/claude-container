# docker-compose.yml — Claude Code CLI with Docker-in-Docker
#
# Usage:
#   docker compose build
#   docker compose run --rm claude          # bash shell
#   docker compose run --rm claude claude   # start Claude CLI directly
#
#   # Mount a specific project instead of ./workspace:
#   PROJECT_PATH=/path/to/project docker compose run --rm claude

services:
  claude:
    build: .
    image: claude-dev
    privileged: true
    stdin_open: true
    tty: true
    volumes:
      - ./auth:/home/claude/.claude
      - ${PROJECT_PATH:-./workspace}:/workspace
